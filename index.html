// ===== START =====
function startQuiz(){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

let form=document.getElementById("form");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";

let html=`<p><b>${q.q}</b></p>`;
q.o.forEach((opt,j)=>{
html+=`<input type="radio" name="q${i}" value="${j}"> ${opt}<br>`;
});

div.innerHTML=html;
form.appendChild(div);
});
}

// ===== RESULT =====
function submitQuiz(){
let correct=0,wrong=0;
let html="<h2>🎯 Result</h2>";

questions.forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`);

if(sel){
if(parseInt(sel.value)==q.a){
correct++;
html+=`<p class="correct">${q.q}<br>✔ Your Answer: ${q.o[sel.value]}</p>`;
}else{
wrong++;
html+=`<p class="wrong">${q.q}<br>❌ Your: ${q.o[sel.value]} | ✔ Correct: ${q.o[q.a]}</p>`;
}
}else{
wrong++;
html+=`<p class="wrong">${q.q}<br>❌ Not Attempted | ✔ ${q.o[q.a]}</p>`;
}
});

html+=`<h2>Score: ${Math.round((correct/questions.length)*100)}%</h2>`;
html+=`<h3>Correct: ${correct} | Wrong: ${wrong}</h3>`;

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("resultBox").innerHTML=html;
}

</script>
